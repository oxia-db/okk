{{- if .Values.pilot.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: okk-pilot
  namespace: {{ include "okk.namespace" . }}
  labels:
    app: okk-pilot
    {{- include "okk.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.pilot.replicas }}
  selector:
    matchLabels:
      app: okk-pilot
  template:
    metadata:
      labels:
        app: okk-pilot
    spec:
      serviceAccountName: okk-pilot
      containers:
        - name: pilot
          image: {{ .Values.pilot.image }}
          ports:
            - containerPort: {{ .Values.pilot.port }}
              name: webhook
          envFrom:
            - secretRef:
                name: okk-pilot-secrets
          env:
            {{- range $key, $value := .Values.pilot.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.pilot.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.pilot.port }}
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.pilot.port }}
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: okk-pilot
  namespace: {{ include "okk.namespace" . }}
  labels:
    app: okk-pilot
    {{- include "okk.labels" . | nindent 4 }}
spec:
  selector:
    app: okk-pilot
  ports:
    - port: {{ .Values.pilot.port }}
      targetPort: {{ .Values.pilot.port }}
      name: webhook
{{- end }}
